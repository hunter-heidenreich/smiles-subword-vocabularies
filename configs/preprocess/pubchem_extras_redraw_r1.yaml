# Training-subsample spot-check, redraw r1. Independent ~5M draw of the headline
# PubChem training corpus, paired with redraws r2 / r3 to bound subsample noise
# on the (V=512, PubChem, NMB) contrast triple (J, |Δfertility|, |ΔD|).
#
# Source: the headline `canon_dedup_v1/train` (test-set-disjoint by
# construction). Distinct `hash_domain` per redraw → independent draws.
# target_n=5M matches the size_sweep_5m regime so direct cross-comparison
# (size-sweep vs draw-noise) is possible.
name: pubchem
input_dir: data/processed/pubchem/canon_dedup_v1/train
output_dir: data/processed/pubchem/canon_dedup_v1_extras/redraw_r1
target_n: 5000000
hash_domain: canon_dedup_v1.redraw.r1
