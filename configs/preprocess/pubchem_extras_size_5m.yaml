# Within-PubChem size sweep. Smaller-band nested subsample of the headline
# PubChem training corpus, at ~5M molecules — the (V=512, PubChem, NMB)
# size-sweep low point.
#
# Source: the headline `canon_dedup_v1/train` Parquet tree (test-set-disjoint
# by construction; the headline holdout split has already been applied).
# Same `hash_domain` as pubchem_extras_size_15m → nesting (5M ⊂ 15M) is
# guaranteed: a SMILES kept at acceptance < 5M/n is also kept at < 15M/n.
name: pubchem
input_dir: data/processed/pubchem/canon_dedup_v1/train
output_dir: data/processed/pubchem/canon_dedup_v1_extras/size_5m
target_n: 5000000
hash_domain: canon_dedup_v1.size_sweep
