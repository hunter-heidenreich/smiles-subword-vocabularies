version: 1
# Pinned software that is a study artifact in its own right. Not a data file:
# recorded here for provenance, while the operative pin lives in pyproject.toml
# [tool.uv.sources]. The artifacts: list below is the data-artifact registry
# validated by smiles_subword.manifest (ManifestEntry); this section is not.
software:
- id: smirk-fork
  repo: hunter-heidenreich/smirk
  commit: c2ee07001a0dbc1456466a451a4a184a9650b505
  tag: vtc-2026-05-24
  upstream: BattModels/Smirk @ v0.2.0 (f7dd001c9e02fcafa4468b80587c2fc80426ecc5)
  pinned_in: pyproject.toml [tool.uv.sources]
  ingest_date: '2026-05-24'
  notes: >-
    Smirk fork, pinned at the production tag
    vtc-2026-05-24 (commit c2ee070, PR #9 on vtc-main), which supersedes the
    vtc-fork-v1.v4 development tags. The Unigram-LM arm delegates its
    EM/pruning loop to HuggingFace tokenizers' UnigramTrainer, built against a
    tokenizers fork carrying the per-piece-alternatives prune fix (HF PR #2070)
    until it lands in a stock release; smirk stays v0.2.0. The rolled-our-own
    native Unigram-LM trainer explored at vtc-fork-v4 is NOT used. Fork
    evolution: v1 shared pre-tokenization + Unigram-LM arm + PUA
    bridge + GpeTrainer scaffold instrumentation + settable seed_size /
    max_piece_length; v2 settable n_sub_iterations /
    shrinking_factor (defaults unchanged at 2 / 0.75); v3 the
    read-only pretokenize_layer_b binding for the absorption measurement.
    Fork details in paper/SMIRK-FORK.md.
- id: openbabel
  package: openbabel-wheel
  version: 3.1.1.23
  openbabel_release: 3.1.0
  pinned_in: pyproject.toml [project.optional-dependencies] crosstoolkit
  ingest_date: '2026-06-13'
  notes: >-
    Second cheminformatics toolkit, used only by the non-canonicity
    measurement's cross-toolkit canonical axis (`obcanon`): each held-out
    molecule is canonicalized with OpenBabel instead of RDKit, then gated to
    identity-preservation by round-tripping back through RDKit. Pinned exactly
    like rdkit because OpenBabel's canonical-SMILES algorithm is
    version-dependent and the deposited rewrite orbit must be reproducible. The
    openbabel-wheel distribution bundles prebuilt OpenBabel 3.1.0 binaries
    (macOS/Linux x cp311-cp313), so no system OpenBabel build is required. Kept
    as an optional extra: only `make measure` needs it, the committed deposits
    carry the readings, and the `make check` gate never re-measures.
